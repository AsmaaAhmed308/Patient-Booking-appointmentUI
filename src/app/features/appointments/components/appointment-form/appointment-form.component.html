<div class="card" style="padding-bottom: 10px;margin-top: 10px;">
    <app-patient-registration (onPatientDataChange)="getPatientData($event)"></app-patient-registration>
    <div class="alert alert-danger" role="alert" *ngIf="missingPatientData" style="margin: 10px 10px 0 10px;">
        There is a missing patient data !
    </div>


    <div class="mb-3">
        <label for="doctorSelect" class="form-label">Select Doctor</label>
        <select class="form-select" id="doctorSelect" [(ngModel)]="selectedDoctorId" name="doctor"
            (ngModelChange)="onDoctorChange($event)" required>
            <option *ngFor="let doctor of doctors" [value]="doctor.doctorId">{{ doctor.name }}</option>
        </select>
    </div>
    <div class="form-group mt-3">
        <label for="date">Select Date</label>
        <input type="date" [(ngModel)]="selectedDate" name="appointmentDate"
             class="form-control" id="date" />
    </div>

    <app-time-slot-picker [docId]="selectedDoctorId" [date]="selectedDate" (onDoctorSelectSlot)="getPatientSelectedSlot($event)"></app-time-slot-picker>
    <div class="alert alert-danger" role="alert" *ngIf="missingSelectedSlotsData"
        style="margin:  10px 10px 0 10px;">
        There is a missing data for the selected slot !
    </div>

    <div class="alert alert-success" role="alert" *ngIf="savedDataSuccessfully" style="margin: 10px 10px 0 10px;">
        Patient appointment was saved successfully!
      </div>
      <div class="alert alert-danger" role="alert" *ngIf="errorSavingData" style="margin: 10px 10px 0 10px;">
        Error ! {{saveErrorMessage}}
      </div>
</div>
<div style="text-align: center; margin-top: 20px;">
    <button type="submit" class="btn btn-success" (click)="savePatientAppointment()">Save Appointment</button>
</div>
